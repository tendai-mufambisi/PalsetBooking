<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Sent — Easy Transit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { min-height:100vh; background:linear-gradient(135deg,#0d2137 0%,#1565c0 60%,#10b981 100%); display:flex; align-items:center; justify-content:center; font-family:"Segoe UI",system-ui,sans-serif; }
    .card { background:#fff; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,.25); width:100%; max-width:440px; padding:44px 40px; text-align:center; }
    .icon-wrap { width:64px; height:64px; background:#d1fae5; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; color:#10b981; margin:0 auto 20px; }
    h1 { font-size:22px; font-weight:800; color:#111827; }
    p { font-size:14px; color:#6b7280; margin-top:10px; line-height:1.6; }
    .btn-back { display:inline-block; margin-top:24px; background:#10b981; color:#fff; border:none; border-radius:8px; padding:11px 28px; font-size:14px; font-weight:700; text-decoration:none; }
    .btn-back:hover { background:#059669; color:#fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap"><i class="bi bi-envelope-check-fill"></i></div>
    <h1>Check Your Email</h1>
    <p>We've sent a password reset link to your email address. Click the link in the email to reset your password.<br><br>If you don't see it, check your spam folder.</p>
    <a href="{% url 'dashboard:login' %}" class="btn-back">Back to Sign In</a>
  </div>
</body>
</html>
