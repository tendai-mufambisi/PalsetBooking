<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — Easy Transit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d2137 0%, #1565c0 60%, #10b981 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      width: 100%; max-width: 440px; padding: 44px 40px;
    }
    .icon-wrap {
      width: 52px; height: 52px; background: #1565c0;
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 24px; color: #fff; margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 800; color: #111827; text-align: center; }
    .subtitle { font-size: 13px; color: #6b7280; text-align: center; margin: 6px 0 28px; line-height: 1.5; }
    label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
    .form-field {
      width: 100%; padding: 10px 14px; font-size: 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      color: #374151; outline: none; transition: border-color .2s; margin-bottom: 20px;
    }
    .form-field:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.12); }
    .btn-submit {
      width: 100%; background: #1565c0; color: #fff;
      border: none; border-radius: 8px; padding: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s;
    }
    .btn-submit:hover { background: #0d47a1; }
    .back-link { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #10b981; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap"><i class="bi bi-key-fill"></i></div>
    <h1>Forgot Password?</h1>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="post">
      {% csrf_token %}
      <label for="email">Email Address</label>
      <input id="email" name="email" type="email" class="form-field" placeholder="you@example.com" autofocus>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>

    <a href="{% url 'dashboard:login' %}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
  </div>
</body>
</html>
