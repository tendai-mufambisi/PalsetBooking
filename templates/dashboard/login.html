<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Easy Transit Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d2137 0%, #1565c0 60%, #10b981 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      width: 100%; max-width: 420px; padding: 44px 40px;
    }
    .brand-logo {
      width: 52px; height: 52px; background: #10b981;
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 24px; color: #fff;
      margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 800; color: #111827; text-align: center; }
    .subtitle { font-size: 13px; color: #6b7280; text-align: center; margin-top: 4px; margin-bottom: 32px; }
    label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
    .form-field {
      width: 100%; padding: 10px 14px; font-size: 14px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      color: #374151; outline: none; transition: border-color .2s;
      margin-bottom: 18px;
    }
    .form-field:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.12); }
    .btn-signin {
      width: 100%; background: #10b981; color: #fff;
      border: none; border-radius: 8px; padding: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .2s; margin-top: 4px;
    }
    .btn-signin:hover { background: #059669; }
    .forgot-link { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #1565c0; text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; }
    .alert-error {
      background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b;
      border-radius: 8px; padding: 11px 14px; font-size: 13px; margin-bottom: 18px;
    }
    .input-wrap { position: relative; }
    .input-wrap .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      margin-top: -9px;
      background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo"><i class="bi bi-car-front-fill"></i></div>
    <h1>Easy Transit</h1>
    <p class="subtitle">Sign in to your admin dashboard</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input id="username" name="username" type="text" class="form-field" placeholder="Enter your username" autocomplete="username" autofocus>

      <label for="password">Password</label>
      <div class="input-wrap">
        <input id="password" name="password" type="password" class="form-field" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()"><i class="bi bi-eye" id="pwIcon"></i></button>
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>

    <a href="{% url 'dashboard:password_reset' %}" class="forgot-link">Forgot your password?</a>
  </div>

  <script>
    function togglePw() {
      var f = document.getElementById('password');
      var i = document.getElementById('pwIcon');
      if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
      else { f.type = 'password'; i.className = 'bi bi-eye'; }
    }
  </script>
</body>
</html>
